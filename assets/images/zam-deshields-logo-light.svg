<svg xmlns="http://www.w3.org/2000/svg" width="540" height="160" viewBox="0 0 540 160" role="img">
  <title>Zam DeShields LLC</title>
  <desc>Zam DeShields LLC — AI · SOVEREIGNTY · GOVERNANCE</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
      .logo-text { font-family: 'Special Elite', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Outer border -->
  <rect x="1" y="1" width="538" height="158" rx="0" fill="none" stroke="#E8EDE6" stroke-width="2"/>
  <!-- Inner border -->
  <rect x="7" y="7" width="526" height="146" rx="0" fill="none" stroke="#E8EDE6" stroke-width="0.5"/>

  <!-- Corner cross marks — top left -->
  <line x1="1" y1="1" x2="15" y2="15" stroke="#E8EDE6" stroke-width="1"/>
  <line x1="15" y1="1" x2="1" y2="15" stroke="#E8EDE6" stroke-width="1"/>
  <!-- Corner cross marks — top right -->
  <line x1="525" y1="1" x2="539" y2="15" stroke="#E8EDE6" stroke-width="1"/>
  <line x1="539" y1="1" x2="525" y2="15" stroke="#E8EDE6" stroke-width="1"/>
  <!-- Corner cross marks — bottom left -->
  <line x1="1" y1="145" x2="15" y2="159" stroke="#E8EDE6" stroke-width="1"/>
  <line x1="15" y1="145" x2="1" y2="159" stroke="#E8EDE6" stroke-width="1"/>
  <!-- Corner cross marks — bottom right -->
  <line x1="525" y1="145" x2="539" y2="159" stroke="#E8EDE6" stroke-width="1"/>
  <line x1="539" y1="145" x2="525" y2="159" stroke="#E8EDE6" stroke-width="1"/>

  <!-- Name -->
  <text
    x="270"
    y="96"
    class="logo-text"
    font-size="36"
    fill="#E8EDE6"
    text-anchor="middle"
    letter-spacing="2"
  >Zam DeShields <tspan font-size="14" letter-spacing="1">llc</tspan></text>

  <!-- Rule -->
  <line x1="20" y1="108" x2="520" y2="108" stroke="#E8EDE6" stroke-width="0.5"/>

  <!-- Tagline -->
  <text
    x="270"
    y="128"
    class="logo-text"
    font-size="10"
    fill="#B8CEB5"
    text-anchor="middle"
    letter-spacing="2.5"
  >AI · SOVEREIGNTY · GOVERNANCE</text>

</svg>
